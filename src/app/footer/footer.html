<footer class="pt-3 pb-2">
  <div class="container text-center text-md-left">
    <div class="row text-center text-md-left text-lg-start">

      <!-- About Us Section -->
      <div class="col-12 col-md-4 col-lg-3 mx-auto mt-3">
        <h5 class="logo mb-0 mx-auto mx-md-0">Nebo Chiropractic</h5>
        <div class="animated-link-container ms-4">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link animated-link" aria-current="Privacy Policy"
                [routerLinkActiveOptions]="{ exact: false }" routerLinkActive="active"
                routerLink="/privacy-policy">Privacy Policy</a>
            </li>
          </ul>
        </div>
      </div>

      <!-- Contact Section -->
      <div class="col-md-4 col-lg-3 col-xl-3 mx-auto mt-3">
        <!-- Address (not clickable, kept as text or you can link to Google Maps) -->
        <div class="d-flex align-items-center mb-3 text-muted">
          <fa-icon [icon]="faLocationDot" class="me-3 fs-4"></fa-icon>
          <span>Payson, UT 84651, US</span>
        </div>

        <!-- Email -->
        <a href="mailto:mtnebochiro@gmail.com"
          class="d-flex align-items-center text-decoration-none text-reset mb-3 animated-link-container">
          <fa-icon [icon]="faEnvelope" class="me-3 fs-4"></fa-icon>
          <span class="animated-link">mtnebochiro@gmail.com</span>
        </a>

        <!-- Phone -->
        <a href="tel:+18014658177"
          class="d-flex align-items-center text-decoration-none text-reset mb-3 animated-link-container">
          <fa-icon [icon]="faPhone" class="me-3 fs-4"></fa-icon>
          <span class="animated-link">+1 801-465-8177</span>
        </a>

        <!-- Fax -->
        <a href="tel:+18014658266"
          class="d-flex align-items-center text-decoration-none text-reset mb-3 animated-link-container">
          <fa-icon [icon]="faFax" class="me-3 fs-4"></fa-icon>
          <span class="animated-link">+1 801-465-8266</span>
        </a>
      </div>
    </div>

    <hr class="mb-4">

    <!-- Copyright and Social Media -->
    <div class="row align-items-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center text-md-right">
          <ul class="list-unstyled list-inline">
            <li class="list-inline-item">
              <a href="#" class="btn-floating btn-sm social-icon"><i class="fab fa-facebook"></i></a>
            </li>
            <li class="list-inline-item">
              <a href="#" class="btn-floating btn-sm social-icon"><i class="fab fa-twitter"></i></a>
            </li>
            <li class="list-inline-item">
              <a href="#" class="btn-floating btn-sm social-icon"><i class="fab fa-google-plus"></i></a>
            </li>
            <li class="list-inline-item">
              <a href="#" class="btn-floating btn-sm social-icon"><i class="fab fa-linkedin-in"></i></a>
            </li>
          </ul>
        </div>
      </div>
      <div class="col-md-7 col-lg-8">
        <p class="text-center text-md-end">© 2026 Copyright:
          <a href="#" class="footer-link">
            <strong>Nebo Chiropractic</strong>
          </a>
        </p>
      </div>
    </div>
  </div>
</footer>
